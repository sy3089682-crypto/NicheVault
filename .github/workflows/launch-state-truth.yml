name: Launch state truth

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-launch-state-truth:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify launch-state truth contract
        run: python verify_launch_state_truth.py
