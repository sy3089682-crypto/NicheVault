<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoSec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Vault icon - abstract geometric shape -->
  <rect x="8" y="25" width="48" height="48" rx="6" fill="url(#logoGrad)" opacity="0.15"/>
  <rect x="14" y="31" width="36" height="36" rx="4" fill="url(#logoGrad)" opacity="0.25"/>
  <!-- Diamond/gem symbol -->
  <polygon points="32,22 48,42 32,62 16,42" fill="url(#logoGrad)" opacity="0.9"/>
  <polygon points="32,30 42,42 32,54 22,42" fill="url(#logoSec)" opacity="0.7"/>
  <!-- Text -->
  <text x="64" y="62" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="url(#logoGrad)" letter-spacing="-1">NicheVault</text>
</svg>